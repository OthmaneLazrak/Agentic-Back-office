server.port=${SERVER_PORT:8000}

spring.application.name=kyc-spring-backend
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kyc_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=40MB

kyc.upload-dir=${KYC_UPLOAD_DIR:temp_uploads}

# ---------------- AI Orchestrator -> Python Agent Server ----------------
# Architecture: Spring (AiOrchestratorService) --HTTP--> FastAPI agent --> MCP tools/models
kyc.agent.base-url=${KYC_AGENT_URL:http://127.0.0.1:8500}
kyc.agent.timeout-seconds=${KYC_AGENT_TIMEOUT_SECONDS:900}

# ---------------- Keycloak / OAuth2 ----------------
keycloak.server-url=${KEYCLOAK_SERVER_URL:http://localhost:8080}
keycloak.realm=${KEYCLOAK_REALM:awb-kyc}
keycloak.frontend-client-id=${KEYCLOAK_FRONTEND_CLIENT_ID:kyc-frontend}
keycloak.admin-client-id=${KEYCLOAK_ADMIN_CLIENT_ID:kyc-backend}
keycloak.admin-client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:kyc-backend-secret-change-me}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.server-url}/realms/${keycloak.realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
