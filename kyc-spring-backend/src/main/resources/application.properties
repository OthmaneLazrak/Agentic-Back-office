server.port=${SERVER_PORT:8000}

spring.application.name=kyc-spring-backend
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kyc_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=40MB

kyc.upload-dir=${KYC_UPLOAD_DIR:temp_uploads}
kyc.python-executable=${KYC_PYTHON:python}
kyc.python-bridge=${KYC_PYTHON_BRIDGE:scripts/kyc_bridge.py}
kyc.python-timeout-seconds=${KYC_PYTHON_TIMEOUT_SECONDS:900}
